server:
  port: 8080

spring:
  devtools:
    restart:
      enabled: true

  datasource:
    url: jdbc:h2:mem:mydb
    username: sa
    password: 
    driverClassName: org.h2.Driver
    # Keep the connection alive if idle for a long time (needed in production)
    testWhileIdle: true
    validationQuery: SELECT 1

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
      naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
    properties:
      hibernate.format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka: 
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: cl.ey.messaging.event
            value:
              default:
                type: cl.ey.messaging.event.UserCreatedEvent

    properties:
      spring:
        json:
          add:
            type:
              headers: false   # evita metadata innecesaria
 
logging:
  level:
    root: INFO
    cl.ey.messaging.consumer: DEBUG
    cl.ey.messaging.producer: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka.clients.consumer: INFO
